# ── Colors: Everforest Hard Dark ─────────────────────────────────────────────

foreground              #D3C6AA
background              #272E33
selection_foreground    #D3C6AA
selection_background    #425047
cursor                  #E69875
cursor_text_color       #272E33
url_color               #7FBBB3
active_border_color     #A7C080
inactive_border_color   #3A464C
bell_border_color       #E69875
wayland_titlebar_color  #272E33

mark1_foreground        #272E33
mark1_background        #E69875
mark2_foreground        #272E33
mark2_background        #A7C080
mark3_foreground        #272E33
mark3_background        #7FBBB3

# black
color0   #272E33
color8   #3A464C
# red
color1   #E67E80
color9   #E67E80
# green
color2   #A7C080
color10  #A7C080
