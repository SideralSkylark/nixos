# ── Fonts ────────────────────────────────────────────────────────────────────

font_family             JetBrainsMono Nerd Font
bold_font               auto
italic_font             auto
bold_italic_font        auto
font_size               14
adjust_line_height      120%
disable_ligatures       never
font_features JetBrainsMonoNF-Regular    +cv02 +cv03 +cv04
font_features JetBrainsMonoNF-Bold       +cv02 +cv03 +cv04
font_features JetBrainsMonoNF-Italic     +cv02 +cv03 +cv04
font_features JetBrainsMonoNF-BoldItalic +cv02 +cv03 +cv04
box_drawing_scale       0.001, 1, 1.5, 2

# ── Window ───────────────────────────────────────────────────────────────────

window_border_width         1pt
draw_minimal_borders        yes
window_margin_width         0
window_padding_width        0
hide_window_decorations     titlebar-only
confirm_os_window_close     0

# ── Cursor ───────────────────────────────────────────────────────────────────

cursor_shape                block
cursor_beam_thickness       1.5
cursor_blink_interval       0.5
cursor_stop_blinking_after  5.0

# ── Scrollback ───────────────────────────────────────────────────────────────

scrollback_lines            10000
scrollback_pager            less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ── Mouse ────────────────────────────────────────────────────────────────────

wheel_scroll_multiplier     3.0
mouse_hide_wait             2.0

# ── URLs ─────────────────────────────────────────────────────────────────────

url_style                   curly
open_url_with               default
url_prefixes                http https file ftp gemini irc gopher mailto news git
detect_urls                 yes

# ── Selection ────────────────────────────────────────────────────────────────

copy_on_select              no
strip_trailing_spaces       smart
rectangle_select_modifiers  ctrl+alt
terminal_select_modifiers   shift
select_by_word_characters   @-./_~?&=%+#

# ── Performance ──────────────────────────────────────────────────────────────

repaint_delay               8
input_delay                 2
sync_to_monitor             yes

# ── Bell ─────────────────────────────────────────────────────────────────────

enable_audio_bell           no
window_alert_on_bell        no
bell_on_tab                 no

# ── Tabs ─────────────────────────────────────────────────────────────────────

tab_bar_edge                top
tab_bar_style               separator
tab_separator               "▎"
tab_bar_align               left
tab_bar_min_tabs            2
tab_switch_strategy         previous
tab_activity_symbol         *
tab_title_template          " {index}:{title} "
tab_bar_margin_height       0.0 0.0

active_tab_foreground       #D3C6AA
active_tab_background       #425047
active_tab_font_style       bold
inactive_tab_foreground     #7A8478
inactive_tab_background     #272E33
inactive_tab_font_style     normal
tab_bar_background          #272E33
tab_bar_margin_color        #272E33

# ── Layouts ──────────────────────────────────────────────────────────────────

enabled_layouts             tall:bias=50;full_size=1;mirrored=false, stack
resize_debounce_time        0.1

# ── Keybindings ──────────────────────────────────────────────────────────────

map ctrl+shift+t            new_tab
map ctrl+shift+w            close_tab
map ctrl+shift+.            next_tab
map ctrl+shift+,            previous_tab
map ctrl+shift+alt+t        set_tab_title
map ctrl+shift+l            next_layout
map ctrl+shift+enter        new_window
map ctrl+shift+n            new_os_window
map ctrl+shift+q            close_window
map ctrl+shift+]            next_window
map ctrl+shift+[            previous_window
map ctrl+shift+f            move_window_forward
map ctrl+shift+b            move_window_backward
map ctrl+shift+`            move_window_to_top
map ctrl+shift+r            start_resizing_window
map ctrl+shift+equal        change_font_size all +2.0
map ctrl+shift+plus         change_font_size all +2.0
map ctrl+shift+minus        change_font_size all -2.0
map ctrl+shift+backspace    change_font_size all 0
map ctrl+shift+c            copy_to_clipboard
map ctrl+shift+v            paste_from_clipboard
map ctrl+shift+s            paste_from_selection
map shift+insert            paste_from_selection
map ctrl+shift+up           scroll_line_up
map ctrl+shift+down         scroll_line_down
map ctrl+shift+page_up      scroll_page_up
map ctrl+shift+page_down    scroll_page_down
map ctrl+shift+home         scroll_home
map ctrl+shift+end          scroll_end
map ctrl+shift+/            show_scrollback
map ctrl+shift+h            show_last_command_output

# ── Misc ─────────────────────────────────────────────────────────────────────

shell                       .
editor                      nvim
close_on_child_death        no
allow_remote_control        socket-only
update_check_interval       0
clipboard_control           write-clipboard write-primary read-clipboard-ask read-primary-ask
