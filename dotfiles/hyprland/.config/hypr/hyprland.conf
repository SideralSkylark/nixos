source = ~/.config/hypr/startup.conf

# ── MONITORS ────────────────────────────────────────────────
monitor = ,preferred,auto,1

# ── PROGRAMS ────────────────────────────────────────────────
$terminal    = kitty
$menu        = fuzzel
$fileManager = thunar

# ── XWAYLAND ────────────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}

# ── ENVIRONMENT ─────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

# ── INPUT ───────────────────────────────────────────────────
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0
}

################################################################################
# THEME — EVERFOREST HARD DARK
################################################################################
$base        = rgb(272E33)        # #272E33  background
$surface     = rgb(2E383C)        # #2E383C  surface
$overlay     = rgb(374145)        # #374145  overlay
$border      = rgb(374145)        # #374145  border (unified)
$text        = rgb(D3C6AA)        # #D3C6AA  text
$subtext     = rgb(9DA9A0)        # #9DA9A0  subtext
$green       = rgb(A7C080)        # #A7C080
$teal        = rgb(83C092)        # #83C092
$blue        = rgb(7FBBB3)        # #7FBBB3
$purple      = rgb(D699B6)        # #D699B6
$peach       = rgb(E69875)        # #E69875
$red         = rgb(E67E80)        # #E67E80

# ── GENERAL ─────────────────────────────────────────────────
general {
    border_size         = 2
    col.active_border   = rgba(A7C080dd) 
    col.inactive_border = rgba(3A464Caa)
    gaps_in             = 3
    gaps_out            = 6
    layout              = dwindle
    allow_tearing       = false
}

# ── DECORATION ──────────────────────────────────────────────
decoration {
    rounding = 0

    blur {
        enabled           = true
        size              = 6
        passes            = 2
        new_optimizations = true
        xray              = false
        noise             = 0.01
        contrast          = 1.1
        brightness        = 1.0
        popups            = false
    }
}

# ── ANIMATIONS ──────────────────────────────────────────────
animations {
    enabled = true

    bezier = snappyOut, 0.16, 1, 0.3, 1

    animation = windows,    1, 2, snappyOut          
    animation = windowsIn,  1, 2, snappyOut
    animation = windowsOut, 1, 2, snappyOut
    animation = fade,       1, 2, snappyOut         
    animation = fadeIn,     1, 2, snappyOut
    animation = fadeOut,    1, 2, snappyOut
    animation = border,     1, 4, snappyOut
    animation = layers,     1, 2, snappyOut
    animation = workspaces, 1, 3, snappyOut, fade
}

# ── LAYOUT ──────────────────────────────────────────────────
dwindle {
    pseudotile     = yes
    preserve_split = yes
}

# ── MISC ────────────────────────────────────────────────────
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
}

################################################################################
# WINDOW RULES
################################################################################
windowrulev2 = suppressevent maximize, class:.*

# Terminal — slight transparency
windowrulev2 = opacity 0.96 0.92,                       class:^(kitty)$
windowrulev2 = bordercolor rgba(A7C080ff) rgba(83C092ff), title:^(.*kitty.*)$

# Floating dialogs
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = size 800 500, class:^(xdg-desktop-portal-gtk)$

windowrulev2 = float, class:^(org\.pulseaudio\.pavucontrol)$
windowrulev2 = size 800 500, class:^(org\.pulseaudio\.pavucontrol)$

windowrulev2 = float, class:^(\.blueman-manager-wrapped)$
windowrulev2 = size 800 500, class:^(\.blueman-manager-wrapped)$

windowrulev2 = float, class:^(floating-wifi)$
windowrulev2 = size 950 650, class:^(floating-wifi)$

################################################################################
# KEYBINDS
################################################################################
$mainMod = super

# ── MEDIA ───────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume,   exec, ~/.config/hypr/scripts/audio up
bind = , XF86AudioLowerVolume,   exec, ~/.config/hypr/scripts/audio down
bind = , XF86AudioMute,          exec, ~/.config/hypr/scripts/audio mute
bind = , XF86AudioMicMute,       exec, ~/.config/hypr/scripts/audio mic
bind = , XF86MonBrightnessUp,    exec, ~/.config/hypr/scripts/brightness up
bind = , XF86MonBrightnessDown,  exec, ~/.config/hypr/scripts/brightness down

# ── SCREENSHOTS ─────────────────────────────────────────────
bind = ,          Print, exec, screenshot screen
bind = $mainMod,  Print, exec, screenshot edit

# ── LAUNCH ──────────────────────────────────────────────────
bind = $mainMod,       return,  exec, $terminal
bind = $mainMod,       space,   exec, $menu
bind = $mainMod,       F,       exec, $fileManager
bind = $mainMod SHIFT, N,       exec, ~/.config/waybar/scripts/reading-mode.sh toggle
bind = $mainMod SHIFT, L,       exec, hyprlock
bind = $mainMod,       W,       exec, ~/.config/hypr/scripts/random-wallpaper

# ── CLIPBOARD ───────────────────────────────────────────────
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# ── NOTIFICATIONS ───────────────────────────────────────────
bind = $mainMod, N, exec, ~/.config/waybar/scripts/dunst-history.sh

# ── WINDOW MANAGEMENT ───────────────────────────────────────
bind = $mainMod,       Q,      killactive
bind = $mainMod SHIFT, V,      togglefloating
bind = $mainMod,       P,      pseudo
bind = $mainMod,       S,      togglesplit
bind = $mainMod SHIFT, F,      fullscreen
bind = $mainMod,       T,      togglegroup

# ── FOCUS ───────────────────────────────────────────────────
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# ── MOVE WINDOWS ────────────────────────────────────────────
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# ── RESIZE ──────────────────────────────────────────────────
bind = $mainMod CTRL, h, resizeactive, -30 0
bind = $mainMod CTRL, l, resizeactive,  30 0
bind = $mainMod CTRL, k, resizeactive,  0 -30
bind = $mainMod CTRL, j, resizeactive,  0  30

# ── WORKSPACES ──────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── MOUSE ───────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
