source = ~/.config/hypr/startup.conf

# Monitors
monitor = ,preferred,auto,1

# Programs
$terminal = kitty
$menu = fuzzel
$fileManager = thunar

# Xwayland
xwayland {
    force_zero_scaling = true
}

# Environment
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

input {
    kb_layout = us
    kb_options = ""
    follow_mouse = 1
    sensitivity = 0
}

################################################################################
# 🎨 THEME COLORS (KANAGAWA)
################################################################################
$base        = rgb(22,22,29)        # #16161D  - background (Waybar)
$surface     = rgb(31,31,40)        # #1F1F28  - surface
$overlay     = rgb(42,42,55)        # #2A2A37  - overlay
$border      = rgb(54,54,70)        # #363646  - border
$text        = rgb(220,215,186)     # #DCD7BA  - text
$subtext     = rgb(200,192,147)     # #C8C093  - subtext
$green       = rgb(152,187,108)     # #98BB6C
$teal        = rgb(122,168,159)     # #7AA89F
$blue        = rgb(126,156,216)     # #7E9CD8
$purple      = rgb(149,127,184)     # #957FB8
$peach       = rgb(220,165,97)      # #DCA561
$red         = rgb(195,64,67)       # #C34043

general {
    border_size = 2
    col.active_border = rgba(7E9CD8dd) rgba(957FB8cc) 45deg
    col.inactive_border = rgba(36364688)
    gaps_in = 3
    gaps_out = 4
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 3
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        xray = false
        noise = 0.01
        contrast = 1.1
        brightness = 1.0
        popups = false
    }
}

animations {
    enabled = true
    bezier = snap, 0.4, 0, 0.6, 1

    animation = windows,    1, 4,   snap, slide
    animation = windowsIn,  1, 3,   snap, popin 97%
    animation = windowsOut, 1, 3,   snap, popin 97%
    animation = fade,       1, 3,   snap
    animation = border,     1, 4,   snap
    animation = layers,     1, 3,   snap
    animation = workspaces, 1, 4,   snap, fade
    animation = global,     1, 4,   snap
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Window Rules
windowrulev2 = suppressevent maximize, class:.*
windowrule = opacity 0.96 0.92, class:.*
windowrulev2 = bordercolor rgba(7E9CD8ff) rgba(957FB8ff), title:^(.*kitty.*)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = size 800 500, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(org\.pulseaudio\.pavucontrol)$
windowrulev2 = size 800 500, class:^(org\.pulseaudio\.pavucontrol)$
windowrulev2 = float, class:^(\.blueman-manager-wrapped)$
windowrulev2 = size 800 500, class:^(\.blueman-manager-wrapped)$
windowrulev2 = float, class:^(floating-wifi)$
windowrulev2 = size 950 650, class:^(floating-wifi)$

$mainMod = super

# Volume & Brightness
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/audio up
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/audio down
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/audio mute
bind = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/audio mic
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness up
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness down
bind = , Print, exec, sh -c 'mkdir -p ~/Pictures/screenshots && grim -g "$(slurp)" ~/Pictures/screenshots/screenshot_$(date +%F_%T).png'

# Launch apps
bind = $mainMod, return, exec, $terminal
bind = $mainMod, space, exec, $menu
bind = $mainMod, F, exec, $fileManager
bind = SUPER SHIFT, N, exec, ~/.config/waybar/scripts/reading-mode.sh toggle
bind = $mainMod SHIFT, L, exec, hyprlock
bind = SUPER, W, exec, ~/.config/hypr/scripts/random-wallpaper

# Clipboard
bind = $mainMod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Notification history
bind = $mainMod, N, exec, ~/.config/waybar/scripts/dunst-history.sh

# Window manipulation
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, S, togglesplit
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, T, togglegroup

# Move focus with arrows
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize windows
bind = $mainMod CTRL, h, resizeactive, -30 0
bind = $mainMod CTRL, l, resizeactive, 30 0
bind = $mainMod CTRL, k, resizeactive, 0 -30
bind = $mainMod CTRL, j, resizeactive, 0 30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
